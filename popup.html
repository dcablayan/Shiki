<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shiki Docs Skin</title>
  <style>
    body {
      width: 270px;
      margin: 0;
      padding: 14px;
      color: #202124;
      background: #f8fafd;
      font: 13px/1.35 Arial, Helvetica, sans-serif;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 16px;
      line-height: 1.2;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid #dde3ea;
    }

    .row:first-of-type {
      border-top: 0;
    }

    button {
      height: 32px;
      border: 0;
      border-radius: 16px;
      padding: 0 14px;
      background: #d3e3fd;
      color: #0b57d0;
      font: inherit;
      font-weight: 700;
    }

    .status {
      margin-top: 10px;
      color: #5f6368;
      min-height: 18px;
    }

    .row.col {
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .avatar-preview {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #dadce0 center/cover no-repeat;
      flex: 0 0 auto;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    button.secondary {
      background: #e8eaed;
      color: #3c4043;
    }
  </style>
</head>
<body>
  <h1>Shiki Docs Skin</h1>
  <div class="row">
    <span>Docs disguise</span>
    <button id="toggle" type="button">Toggle</button>
  </div>
  <div class="row">
    <span>Conversation sync</span>
    <button id="sync" type="button">Sync</button>
  </div>
  <div class="row">
    <span>Rich formatting</span>
    <button id="formatting" type="button">On</button>
  </div>
  <div class="row">
    <span>Image button</span>
    <button id="imageControl" type="button">Composer</button>
  </div>
  <div class="row col">
    <span>Profile picture</span>
    <span class="actions">
      <span class="avatar-preview" id="avatarPreview" aria-hidden="true"></span>
      <button id="pickAvatar" type="button">Change</button>
      <button id="resetAvatar" type="button" class="secondary">Reset</button>
    </span>
  </div>
  <input id="avatarFile" type="file" accept="image/*" hidden>
  <div class="status" id="status">Ready on supported AI pages.</div>
  <script src="popup.js"></script>
</body>
</html>
